version: 2

models:
  - name: stg_transactions
    description: "Tabela de transações tratada"

    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique

      - name: account_id
        tests:
          - not_null

      - name: amount
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null
